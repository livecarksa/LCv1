name: livecar_workshop
description: تطبيق الورشة لمنصة لايف كار
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.4.3
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  image_picker: ^1.1.0
  mobile_scanner: ^5.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  another_flushbar: ^1.12.30
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/lottie/
  fonts:
    - family: IBMPlexArabic
      fonts:
        - asset: assets/fonts/IBMPlexArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexArabic-SemiBold.ttf
          weight: 600
    - family: Alexandria
      fonts:
        - asset: assets/fonts/Alexandria-Regular.ttf
        - asset: assets/fonts/Alexandria-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Alexandria-Bold.ttf
          weight: 700
